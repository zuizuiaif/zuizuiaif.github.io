<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>改变img的src</title>
<style>
	
</style>
</head>
<body>
<input type="button" value="改变img" id="btn">
<img src="img/1.jpg" id="imgs">
<script>
	var btn = document.getElementById("btn");
	var imgs = document.getElementById("imgs");
	var onoff = true;
	btn.onclick = function(){
		if(onoff){
			imgs.src = "img/2.jpg";
			onoff = false;
		}else{
			imgs.src = "img/1.jpg"
			onoff = true;
		}
	}
</script>
</body>
</html>
