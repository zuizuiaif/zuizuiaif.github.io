<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>简单元素操作</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<section id="box">
	<h1>请为下面的DIV设置样式: <span id="span">点击设置</span></h1>
	<div id="div"></div>
</section>
<section id="box1"></section>
<section id="box2">
	<div id="box2_div1">
		请选择背景色
		<input type="button" value="红" id="red">
		<input type="button" value="黄" id="yellow">
		<input type="button" value="蓝" id="blue">
	</div>
	<div id="box2_div2">
		请选择宽(px)
		<input type="button" value="200" id="width1" class="input">
		<input type="button" value="300" id="width2" class="input">
		<input type="button" value=400 id="width3" class="input">
	</div>
	<div id="box2_div3">
		请选择高(px)
		<input type="button" value="200" id="height1" class="input">
		<input type="button" value="300" id="height2" class="input">
		<input type="button" value="400" id="height3" class="input">
	</div>
	<div id="box2_div4">
		<input type="button" value="恢复" id="recover" class="confirm">
		<input type="button" value="确定" id="confirm" class="confirm">
	</div>
</section>
<script src="js/index.js">
</script>
</body>
</html>
