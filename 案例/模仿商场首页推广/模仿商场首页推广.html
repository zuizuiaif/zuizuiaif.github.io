<script>
	var navs = document.getElementById("navs");
	var label = navs.getElementsByTagName("a");
	var content = document.getElementById("content")
	var divs = content.getElementsByTagName("div");
	for (var i = 0; i < label.length; i++) {
		label[i].index = i;
		label[i].onmouseover = function(){
			for (var o = 0; o < divs.length; o++) {
				label[o].style.backgroundColor = "#e7e7e7";
				divs[o].style.display = "none";
			}
			divs[this.index].style.display = "block";
			label[this.index].style.backgroundColor = "#fff";
		}
	}
	function tab(obj){
		var imgs = obj.getElementsByTagName("img");
		var spans = obj.getElementsByTagName("span");
		for (var i = 0; i < spans.length; i++) {
			spans[i].xb = i;
			spans[i].onmouseover = function(){
				for (var o = 0; o < imgs.length; o++) {
					imgs[o].style.display = "none";
					spans[o].style.background = "#5a5a52"
				}
				imgs[this.xb].style.display = "block";
				this.style.background = "#ef3163";
			}
		}
	}
	for (var i = 0; i < divs.length; i++) {
		tab(divs[i]);
	}
</script>
